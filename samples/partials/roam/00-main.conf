# 00-main.conf — the "roam" network: a FULL-tunnel VPN (road-warrior clients
# route all their traffic through this server). Same partial model as
# backups/, one variable flipped: tunnel = full.
#
# Reminder: a #= value is the whole rest of the line — keep comments separate.

# --- network policy -------------------------------------------------------
# tunnel = full → clients get AllowedIPs = 0.0.0.0/0, ::/0 in their configs.
#= tunnel = full
#= subnet = 10.9.0.0/24
#= endpoint = vpn.example.com:51821
# server's PUBLIC key (safe to commit); `wg genkey | tee server.key | wg pubkey`
#= server_public_key = mBaCExampleRoamServerPublicKeyBase64efgh=
# dns: a real resolver, since ALL client DNS comes through here.
#= dns = 1.1.1.1
#= mtu = 1420

# --- server interface -----------------------------------------------------
#= address = 10.9.0.1/24
#= listen_port = 51821

[Interface]
Address    = ${address}
ListenPort = ${listen_port}
# A full tunnel needs the server to NAT client traffic out to the internet.
# wirebard does NOT synthesize iptables — you own the forwarding rules, right
# here, hand-written (swap eth0 for your uplink):
PostUp   = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
# PrivateKey injected into the compiled roam.conf from partials/roam/server.key.
