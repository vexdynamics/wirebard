# 00-main.conf — the "backups" network. Sorts first in the folder, so it owns
# two things, exactly like haladin's 00-defaults.wish.conf:
#   (1) the [Interface] stanza that heads the compiled backups.conf, and
#   (2) EVERY #= variable the peer partials in this folder may use. A #= line
#       in any later partial is an error (variables are declared once, here).
#
# The peer partials (10-*, 20-*, …) are appended in bytewise filename order to
# produce /etc/wireguard/backups.conf. `wirebard peer add --network backups`
# writes the next one for you; you can also hand-copy template.conf.
#
# IMPORTANT: a #= value runs from '=' to end of line — no inline comments, no
# quotes. Keep explanations on their own comment lines, like these.

# --- network policy — read by wirebard, NOT WireGuard syntax --------------
# tunnel: split | full. split = client reaches only ${subnet}; full = client
#   routes ALL its traffic through this server (0.0.0.0/0). Only affects the
#   CLIENT config wirebard renders — the server side is identical either way.
#= tunnel = split
# subnet: the pool wirebard allocates peer /32s from.
#= subnet = 10.8.2.0/24
# endpoint: what clients dial; goes into the client configs.
#= endpoint = vpn.example.com:51820
# dns: pushed to clients (leave the value empty to omit the line).
#= dns = 10.8.2.1
#= mtu = 1420

# --- the server's own interface -------------------------------------------
# address: the server's own address inside ${subnet}.
#= address = 10.8.2.1/24
#= listen_port = 51820

[Interface]
Address    = ${address}
ListenPort = ${listen_port}
# NOTE: no PrivateKey line here on purpose. wirebard injects it into the
# COMPILED backups.conf (mode 0600) from partials/backups/server.key at build
# time. It never appears in a partial, in --verbose, or in any client config.
