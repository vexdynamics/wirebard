# template.conf — copy me to NN-name.conf to add a peer by hand.
#
# HOW PARTIALS WORK
#   Every *.conf in this folder EXCEPT template.conf is compiled, merged in
#   bytewise filename order — hence the NN- prefix: 00 the interface + vars,
#   10s onward one peer each. template.conf and anything not ending in .conf
#   is ignored, and WireGuard never reads this directory (it reads the
#   compiled ../../backups.conf).
#
# VARIABLES are declared ONCE in 00-main.conf as `#= name = value` and used
#   anywhere as ${name}. Escape a literal with $${name}.
#
# A PEER is one [Peer] block. wirebard reads the leading `# wirebard:` comment
# for metadata WireGuard itself ignores. AllowedIPs is this peer's assigned
# address as a /32 — the address wirebard's allocator hands out and the only
# thing the server routes to this peer. Let `peer add` fill it, or pick a free
# host in ${subnet} yourself.

# wirebard: name=example
[Peer]
PublicKey  = REPLACE_WITH_PEER_PUBLIC_KEY_BASE64=
AllowedIPs = 10.8.2.9/32
